/**
 * Affiche le bottom sheet mobile avec les données d'un pin.
 * @param {object} d - Données du pin
 * @param {string} icon - Emoji icon
 * @param {string} sub - Sous-titre
 * @param {string} rows - HTML des rangées (format info-row)
 */
function showMobileSheet(d, icon, sub, rows) {
  const sheet   = document.getElementById('mobile-info-sheet');
  const overlay = document.getElementById('mobile-sheet-overlay');
  if (!sheet || !overlay) return;

  document.getElementById('sheet-icon').textContent  = icon;
  document.getElementById('sheet-title').textContent = d.name || 'Détails';
  document.getElementById('sheet-sub').textContent   = sub || '';

  /* Convertir les info-row en sheet-row (classes différentes pour le sheet) */
  const sheetRows = rows
    .replace(/class="info-row"/g, 'class="sheet-row"')
    .replace(/class="info-row-label"/g, 'class="sheet-row-label"')
    .replace(/class="info-row-value"/g, 'class="sheet-row-value"');

  document.getElementById('sheet-rows').innerHTML = sheetRows;

  sheet.classList.add('open');
  overlay.classList.add('open');
  sheet.setAttribute('aria-hidden', 'false');
  overlay.setAttribute('aria-hidden', 'false');
}

/**
 * Ferme le bottom sheet mobile.
 */
function closeMobileSheet() {
  const sheet   = document.getElementById('mobile-info-sheet');
  const overlay = document.getElementById('mobile-sheet-overlay');
  sheet?.classList.remove('open');
  overlay?.classList.remove('open');
  sheet?.setAttribute('aria-hidden', 'true');
  overlay?.setAttribute('aria-hidden', 'true');
}

/* Fermer le sheet au clic sur l'overlay ou le bouton close */
document.getElementById('mobile-sheet-overlay')?.addEventListener('click', closeMobileSheet);

   ================================================================ */
document.addEventListener('keydown', (e) => {
  /* Ignorer si l'utilisateur tape dans un champ */
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  const THEMES = ['meteo', 'seismes', 'conflits', 'crypto', 'iss', 'population', 'vols'];

  if (e.key >= '1' && e.key <= '7') {
    const theme = THEMES[parseInt(e.key, 10) - 1];
    if (theme) switchTheme(theme);
  }

  if (e.key === 'r' || e.key === 'R') {
    btnRotate?.click();
  }
});

/* ================================================================
   TICKER (crypto live + forex live + simulated indices)
   ================================================================ */
async function initTicker() {
  try {
    /* ── Crypto from CoinGecko ── */
    const cryptoIds = 'bitcoin,ethereum,solana,binancecoin,ripple,dogecoin';
    const cryptoRes = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cryptoIds}&vs_currencies=usd&include_24hr_change=true`);
    const crypto    = await cryptoRes.json();

    const cryptoItems = [
      { sym: 'BTC',  id: 'bitcoin'     },
      { sym: 'ETH',  id: 'ethereum'    },
      { sym: 'SOL',  id: 'solana'      },
      { sym: 'BNB',  id: 'binancecoin' },
      { sym: 'XRP',  id: 'ripple'      },
      { sym: 'DOGE', id: 'dogecoin'    },
    ].map(c => ({
      sym:    c.sym,
      price:  crypto[c.id]?.usd,
      change: crypto[c.id]?.usd_24h_change,
    }));

    /* ── Forex from Frankfurter ── */
    const fxRes  = await fetch('https://api.frankfurter.app/latest?from=USD&to=EUR,GBP,JPY,CHF,CAD');
    const fxJson = await fxRes.json();

    const fxItems = Object.entries(fxJson.rates).map(([cur, rate]) => ({
      sym:    `USD/${cur}`,
      price:  rate,
      change: (Math.random() - 0.5) * 0.4, /* small simulated variation */
    }));

    /* ── Simulated indices (realistic) ── */
    const indices = [
      { sym: 'S&P 500',  price: 5_218 + (Math.random()-0.5)*40,  change: (Math.random()-0.4)*1.5 },
      { sym: 'NASDAQ',   price: 16_340 + (Math.random()-0.5)*120, change: (Math.random()-0.4)*1.8 },
      { sym: 'DOW',      price: 38_900 + (Math.random()-0.5)*200, change: (Math.random()-0.4)*1.2 },
      { sym: 'CAC 40',   price: 8_020 + (Math.random()-0.5)*60,   change: (Math.random()-0.4)*1.3 },
      { sym: 'DAX',      price: 18_200 + (Math.random()-0.5)*90,  change: (Math.random()-0.4)*1.4 },
      { sym: 'NIKKEI',   price: 38_600 + (Math.random()-0.5)*300, change: (Math.random()-0.4)*1.6 },
    ];

    const all = [...cryptoItems, ...fxItems, ...indices];
    renderTicker(all);

  } catch (err) {
    console.warn('Ticker error:', err);
    /* Fallback static data */
    renderTicker([
      { sym: 'BTC',   price: 67_000, change: 2.1  },
      { sym: 'ETH',   price: 3_200,  change: -0.8 },
      { sym: 'S&P 500', price: 5_218, change: 0.4 },
    ]);
  }

  /* Refresh ticker every 3 minutes */
  setTimeout(initTicker, 180_000);
}

  try {
    const fRes  = await fetch(
      'https://api.frankfurter.app/latest?from=USD&to=EUR,GBP,JPY,CHF,CAD,AUD',
      { signal: AbortSignal.timeout(6000) }
    );
    const fData = await fRes.json();

    /* Paires principales, taux inversé pour afficher USD/XXX */
    const fxItems = [
      { code: 'EUR', label: 'EUR/USD' },
      { code: 'GBP', label: 'GBP/USD' },
      { code: 'JPY', label: 'USD/JPY' },
      { code: 'CHF', label: 'USD/CHF' },
      { code: 'CAD', label: 'USD/CAD' },
      { code: 'AUD', label: 'AUD/USD' },
    ].filter(p => fData.rates[p.code]).map(p => {
      const rate = fData.rates[p.code];
      /* JPY et CAD : afficher taux direct (USD→JPY = grand nombre) */
      const price  = p.label.startsWith('USD/') ? rate : 1 / rate;
      return {
        sym:    p.label,
        tag:    'Forex',
        price,
        change: (Math.random() - 0.5) * 0.25,   /* variation intraday simulée */
      };
    });

    renderMarkets([...indexItems, ...fxItems], 'Live');
  } catch (err) {
    /* Forex indispo — on garde les indices seuls */
    console.warn('Forex error:', err);
    renderMarkets(indexItems, 'Indices only');
  }

  /* Refresh toutes les 90 secondes */
  setTimeout(initMarkets, 90_000);
}

function renderMarkets(items, status = 'Live') {
  const refreshEl = document.getElementById('markets-refresh');
  if (refreshEl) {
    refreshEl.textContent = status === 'Live'
      ? 'Mis à jour ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
      : status;
  }

  const container = document.getElementById('markets-items');

  /* Dupliquer les items pour le défilement infini (même pattern que le ticker) */
  const html = [...items, ...items].map(item => {
    const price = item.price == null ? '—' :
      item.price >= 1000 ? item.price.toLocaleString('fr-FR', { maximumFractionDigits: 0 }) :
      item.price >= 1    ? item.price.toFixed(2) :
      item.price.toFixed(4);

    const ch    = typeof item.change === 'number' ? item.change : 0;
    const sign  = ch >= 0 ? '+' : '';
    const cls   = ch >= 0 ? 'up' : 'down';
    const arrow = ch >= 0 ? '▲' : '▼';

    /* Flash visuel si la variation dépasse 1.2% (valeurs notables) */
    const flashClass = Math.abs(ch) >= 1.2 ? (ch >= 0 ? ' flash-up' : ' flash-down') : '';

    /* Toutes les valeurs texte passent par esc() */
    return `
      <div class="market-item${flashClass}">
        <div class="market-top">
          <span class="market-sym">${esc(item.sym)}</span>
          <span class="market-tag" data-type="${esc(item.tag)}">${esc(item.tag)}</span>
        </div>
        <div class="market-bottom">
          <span class="market-price">${price}</span>
          <span class="market-change ${cls}">${arrow} ${sign}${ch.toFixed(2)}%</span>
        </div>
      </div>`;
  }).join('');

  /* Envelopper dans un track animé (auto-marquee infini) */
  container.innerHTML = `<div class="markets-track">${html}</div>`;
}

/* ================================================================
   NEWS SIDEBAR — RSS temps réel
   Stratégie en 3 couches pour garantir la disponibilité :
   1. rss2json.com (JSON direct, gratuit)
   2. allorigins.win (proxy CORS → parse XML avec DOMParser)
   3. corsproxy.io  (proxy CORS alternatif)
   Sources actives : BBC World · Al Jazeera · The Guardian · NPR
   ================================================================ */

/* Flux RSS vérifiés actifs en 2025 */
const NEWS_FEEDS = [
  { url: 'https://feeds.bbci.co.uk/news/world/rss.xml',       label: 'BBC World'    },
  { url: 'https://www.aljazeera.com/xml/rss/all.xml',         label: 'Al Jazeera'   },
  { url: 'https://www.theguardian.com/world/rss',             label: 'The Guardian' },
  { url: 'https://feeds.npr.org/1004/rss.xml',                label: 'NPR World'    },
  { url: 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml', label: 'NY Times' },
];

/* Méthode 1 — rss2json.com → renvoie JSON directement */
async function fetchViaRss2json(feedUrl) {
  const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&count=20`;
  const res  = await fetch(api, { signal: AbortSignal.timeout(6000) });
  const json = await res.json();
  if (json.status !== 'ok' || !json.items?.length) throw new Error('rss2json empty');
  return json.items.map(item => ({
    title:  item.title?.trim(),
    link:   item.link,
    date:   item.pubDate,
    source: json.feed?.title ?? 'World News',
    cat:    Array.isArray(item.categories) ? item.categories[0] : 'International',
  })).filter(a => a.title);
}

/* Méthode 2 — proxy CORS + DOMParser (fallback universel) */
async function fetchViaProxy(feedUrl, proxyBase) {
  const proxied = `${proxyBase}${encodeURIComponent(feedUrl)}`;
  const res     = await fetch(proxied, { signal: AbortSignal.timeout(8000) });
  const text    = proxyBase.includes('allorigins')
    ? (await res.json()).contents          /* allorigins enveloppe dans .contents */
    : await res.text();
  const doc     = new DOMParser().parseFromString(text, 'text/xml');
  const items   = [...doc.querySelectorAll('item')];
  if (!items.length) throw new Error('proxy empty');
  const source  = doc.querySelector('channel > title')?.textContent?.trim() ?? 'World News';
  return items.slice(0, 20).map(el => ({
    title:  el.querySelector('title')?.textContent?.trim(),
    link:   el.querySelector('link')?.textContent?.trim()
         || el.querySelector('guid')?.textContent?.trim(),
    date:   el.querySelector('pubDate')?.textContent?.trim(),
    source,
    cat:    el.querySelector('category')?.textContent?.trim() ?? 'International',
  })).filter(a => a.title);
}

async function initNews() {
  const newsEl = document.getElementById('news-list');

  /* Tentatives ordonnées : rss2json puis deux proxies CORS sur plusieurs feeds */
  const strategies = [];
  for (const feed of NEWS_FEEDS) {
    strategies.push(
      () => fetchViaRss2json(feed.url),
      () => fetchViaProxy(feed.url, 'https://api.allorigins.win/get?url='),
      () => fetchViaProxy(feed.url, 'https://corsproxy.io/?'),
    );
  }

  let articles = [];
  for (const attempt of strategies) {
    try {
      articles = await attempt();
      if (articles.length) break;
    } catch { /* essayer la stratégie suivante */ }
  }

  if (articles.length) {
    renderNews(articles);
  } else {
    console.warn('News: toutes les sources ont échoué');
    newsEl.innerHTML = `
      <div class="news-empty">
        <div>📡</div>
        <div style="text-align:center;padding:0 12px">
          Actualités indisponibles<br>
          <span style="font-size:10px">Vérifiez la connexion</span>
        </div>
      </div>`;
  }

  /* Refresh toutes les 10 minutes */
  setTimeout(initNews, 600_000);
}

function renderNews(articles) {
  const newsEl = document.getElementById('news-list');

  newsEl.innerHTML = articles.map((a, i) => {
    /* Date relative — défensive si le format est invalide */
    let age = '';
    try {
      const diff  = Date.now() - new Date(a.date).getTime();
      const hours = Math.floor(diff / 3_600_000);
      const mins  = Math.floor(diff / 60_000);
      age = hours > 0 ? `il y a ${hours}h` : mins > 0 ? `il y a ${mins}min` : 'À l\'instant';
    } catch { age = ''; }

    /* Toutes les valeurs passent par esc() — prévient les injections XSS */
    return `
      <a class="news-item" href="${safeUrl(a.link)}" target="_blank" rel="noopener noreferrer" style="--i:${i}">
        <div class="news-item-cat">${esc((a.cat || 'World').toUpperCase().slice(0, 25))}</div>
        <div class="news-item-title">${esc(a.title)}</div>
        <div class="news-item-meta">${esc(a.source)} · ${esc(age)}</div>
      </a>`;
  }).join('');
}

function renderTicker(items) {
  const track = document.getElementById('ticker-track');
  /* Doublé pour le défilement infini fluide — CSS translateX(-50%) */
  const html = [...items, ...items].map(item => {
    const price = typeof item.price === 'number'
      ? item.price >= 1000
        ? item.price.toLocaleString('fr-FR', { maximumFractionDigits: 0 })
        : item.price >= 1 ? item.price.toFixed(2) : item.price.toFixed(4)
      : '—';
    const ch      = typeof item.change === 'number' ? item.change : 0;
    const chStr   = (ch >= 0 ? '+' : '') + ch.toFixed(2) + '%';
    const chClass = ch >= 0 ? 'up' : 'down';
    const arrow   = ch >= 0 ? '▲' : '▼';

    /* esc() sur item.sym — données potentiellement externes */
    return `<div class="ticker-item">
      <span class="ticker-sym">${esc(item.sym)}</span>
      <span class="ticker-price">${price}</span>
      <span class="ticker-change ${chClass}">${arrow} ${chStr}</span>
    </div>`;
  }).join('');
  track.innerHTML = html;
}

/* ================================================================
   THREE.JS HELPERS (inlined — no separate files)
   ================================================================ */

/* ── Stars ── */
function buildStarfield(numStars = 3000) {
  const verts  = [];
  const colors = [];
  for (let i = 0; i < numStars; i++) {
    const r     = 25 + Math.random() * 25;
    const u     = Math.random();
    const v     = Math.random();
    const theta = 2 * Math.PI * u;
    const phi   = Math.acos(2 * v - 1);
    verts.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
    const col = new THREE.Color().setHSL(0.6, 0.3, 0.5 + Math.random() * 0.5);
    colors.push(col.r, col.g, col.b);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.12, vertexColors: true, sizeAttenuation: true }));
}

/* ── Fresnel atmosphere ── */
function buildFresnelMat(rimHex = 0x3a9bd8, facingHex = 0x000000) {
  const uniforms = {
    color1:       { value: new THREE.Color(rimHex) },
    color2:       { value: new THREE.Color(facingHex) },
    fresnelBias:  { value: 0.2 },
    fresnelScale: { value: 1.0 },
    fresnelPower: { value: 8.0 },
  };
  const vs = `
    uniform float fresnelBias, fresnelScale, fresnelPower;
    varying float vRF;
    void main() {
      vec4 mvPos  = modelViewMatrix * vec4(position, 1.0);
      vec4 wPos   = modelMatrix * vec4(position, 1.0);
      vec3 wNorm  = normalize(mat3(modelMatrix[0].xyz, modelMatrix[1].xyz, modelMatrix[2].xyz) * normal);
      vec3 I      = wPos.xyz - cameraPosition;
      vRF = fresnelBias + fresnelScale * pow(1.0 + dot(normalize(I), wNorm), fresnelPower);
      gl_Position = projectionMatrix * mvPos;
    }
  `;
  const fs = `
    uniform vec3 color1, color2;
    varying float vRF;
    void main() {
      float f = clamp(vRF, 0.0, 1.0);
      gl_FragColor = vec4(mix(color2, color1, vec3(f)), f);
    }
  `;
  return new THREE.ShaderMaterial({
    uniforms, vertexShader: vs, fragmentShader: fs,
    transparent: true, blending: THREE.AdditiveBlending,
  });
}
